<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6-c</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        #_1{background-color: rgb(95, 55, 187);
        position: absolute;
        height: 100px; width: 100px;
            top: 0;
            right: 0;}
        #_2{background-color: rgb(56, 136, 31);
        position: absolute;
        height: 100px; width: 100px;
            top: 0;
            left: 0;}
        #_3{background-color: rgb(228, 49, 49);
        position: absolute;
        height: 100px; width: 100px;
            bottom: 0;
            right: 0;}
        #_4{background-color: rgb(245, 229, 83);
        position: absolute;
        height: 100px; width: 100px;
            bottom: 0;
            left: 0;}
        
        #_5 {
            background-color: rgb(52, 152, 219);
            position: absolute;
            height: 100px; width: 100px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .box{
            text-align: center;
            align-content: center;
            width: 100%;
            height: 25%;
        }

        .quadro{
            height: 100lvh;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-content: center;
            justify-content: space-around;
        }


    </style>
</head>
<body>
    <div class="quadro">
        <div class="box" id="_1">1</div>
        <div class="box" id="_2">2</div>
        <div class="box" id="_3">3</div>
        <div class="box" id="_4">4</div>
        <div class="box" id="_5">5</div>
    </div>
</body>
</html>
