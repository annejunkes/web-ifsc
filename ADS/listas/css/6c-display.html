<!DOCTYPE html>
<html lang="en">
<head>

    <title>6-c</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        #_1{background-color: rgb(95, 55, 187);}
        #_2{background-color: rgb(56, 136, 31);}
        #_3{background-color: rgb(228, 49, 49);}

        .box{
            text-align: center;
            align-content: center;
            width: 100%;
            height: 25%;
        }

        .quadro{
            height: 100lvh;
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            align-content: center;
            justify-content: space-around;
        }


    </style>
</head>
<body>
    <div class="quadro">
        <div class="box" id="_1">1</div>
        <div class="box" id="_2">2</div>
        <div class="box" id="_3">3</div>
        <div class="box" id="_4">4</div>
    </div>
</body>
